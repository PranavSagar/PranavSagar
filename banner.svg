<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 210" width="900" height="210">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="45%" stop-color="#0f2a4a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#a371f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="210" fill="url(#bg)"/>

  <!-- Decorative dots -->
  <circle cx="60" cy="50" r="2" fill="#1f6feb" opacity="0.5"/>
  <circle cx="100" cy="30" r="1.5" fill="#58a6ff" opacity="0.4"/>
  <circle cx="840" cy="45" r="2" fill="#1f6feb" opacity="0.5"/>
